<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; overflow: hidden; }
        
        /* Charaqlaydigan effektlar */
        .neon-glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 100%; background: radial-gradient(circle, rgba(50,205,50,0.1) 0%, transparent 70%); z-index: -1; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .bal { background: #111; padding: 10px 20px; border-radius: 20px; border: 1px solid #32CD32; box-shadow: 0 0 10px #32CD32; }
        .bal span { color: #32CD32; font-weight: bold; font-size: 20px; }

        /* Qimirlaydigan Raketa */
        .rocket-box { background: #111; padding: 20px; border-radius: 25px; margin-bottom: 30px; border: 1px solid #00d1ff; position: relative; }
        .rocket-box h2 { color: #00d1ff; margin: 0; font-style: italic; }
        .rocket-img { width: 80px; position: absolute; right: 20px; top: 10px; animation: fly 2s infinite ease-in-out; }
        @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Charaqlaydigan Pepe Case */
        .case-card { 
            background: #050505; border: 2px solid #32CD32; border-radius: 30px; padding: 30px; 
            box-shadow: 0 0 25px rgba(50, 205, 50, 0.3); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 15px #32CD32; } 50% { box-shadow: 0 0 35px #32CD32; } 100% { box-shadow: 0 0 15px #32CD32; } }
        .pepe { width: 180px; filter: drop-shadow(0 0 10px #32CD32); }

        .btn { background: #32CD32; color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
        .timer { font-size: 24px; color: #ffd700; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="neon-glow"></div>
    
    <div class="header">
        <div class="bal"><span>0.00 TON</span></div>
        <i class="fa-solid fa-wallet" style="color:#32CD32; font-size: 25px;" onclick="alert('Min: 0.1 TON / 250 Stars')"></i>
    </div>

    <div class="rocket-box">
        <h2>ROCKET</h2>
        <img src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png" class="rocket-img">
    </div>

    <div class="case-card">
        <img src="https://i.ibb.co/vYm6v6K/pepe-gift.png" class="pepe">
        <h2 style="margin: 10px 0;">Pepe Free Case</h2>
        <button class="btn" id="btn" onclick="openBox()">OPEN FREE</button>
        <div class="timer" id="timer">24:00:00</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openBox() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('btn').style.display = 'none';
            document.getElementById('timer').style.display = 'block';
            // Taymer kodi...
        }
    </script>
</body>
</html>
