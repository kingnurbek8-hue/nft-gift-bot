<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Gift Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0e0e0e; --card-bg: #1a1a1a; --primary: #7b61ff; --text: #ffffff; --accent: #00d1ff; }
        body { background: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .balance-container { background: var(--card-bg); padding: 8px 15px; border-radius: 20px; border: 1px solid #333; display: flex; align-items: center; gap: 8px; }
        .balance-container span { color: var(--accent); font-weight: bold; font-size: 18px; }
        .deposit-btn { background: var(--primary); padding: 8px 18px; border-radius: 12px; font-weight: bold; text-decoration: none; color: white; font-size: 14px; }

        .banner { width: 100%; height: 100px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; padding: 20px; box-sizing: border-box; }
        .rocket-banner { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); }
        .pvp-banner { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); }
        .banner h2 { margin: 0; font-size: 22px; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.3); }

        .grid-title { font-size: 18px; margin: 20px 0 10px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .case-card { background: var(--card-bg); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .case-card img { width: 85px; height: 85px; margin-bottom: 10px; }
        .price-btn { background: rgba(123, 97, 255, 0.15); color: var(--primary); padding: 6px 15px; border-radius: 12px; font-size: 14px; display: inline-block; font-weight: bold; border: 1px solid var(--primary); margin-top: 8px; }

        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; text-decoration: none; font-size: 10px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div style="font-size: 11px; color: #888; margin-bottom: 4px;">Your balance</div>
            <div class="balance-container">
                <i class="fa-solid fa-gem"></i>
                <span id="balance">0.095</span>
            </div>
        </div>
        <a href="#" class="deposit-btn">Deposit</a>
    </div>

    <div class="banner rocket-banner">
        <h2>ROCKET</h2>
    </div>
    <div class="banner pvp-banner">
        <h2>PVP BATTLE</h2>
    </div>

    <div class="grid-title">Exclusive Cases</div>
    <div class="cases-grid">
        <div class="case-card" onclick="openCase('FREE')">
            <img src="https://cdn-icons-png.flaticon.com/512/6740/6740121.png">
            <div style="font-size: 14px; font-weight: bold;">Free 24h</div>
            <div class="price-btn">FREE</div>
        </div>
        <div class="case-card" onclick="openCase('FARM')">
            <img src="https://cdn-icons-png.flaticon.com/512/2850/2850366.png">
            <div style="font-size: 14px; font-weight: bold;">Farm Case</div>
            <div class="price-btn">0.1 TON</div>
        </div>
        <div class="case-card" onclick="openCase('VIP')">
            <img src="https://cdn-icons-png.flaticon.com/512/1162/1162954.png">
            <div style="font-size: 14px; font-weight: bold;">VIP Case</div>
            <div class="price-btn">100 TON</div>
        </div>
        <div class="case-card" onclick="openCase('ELITE')">
            <img src="https://cdn-icons-png.flaticon.com/512/2331/2331871.png">
            <div style="font-size: 14px; font-weight: bold;">Elite Box</div>
            <div class="price-btn">250 TON</div>
        </div>
    </div>

    <div class="navbar">
        <a href="#" class="nav-item"><i class="fa-solid fa-box-archive"></i>Backpack</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-user-plus"></i>Invite</a>
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-trophy"></i>Leader</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-wallet"></i>Earn</a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#0e0e0e";
        tg.backgroundColor = "#0e0e0e";

        function openCase(name) {
            tg.HapticFeedback.impactOccurred('medium');
            alert("Opening " + name + " Case...");
        }
    </script>
</body>
</html>
