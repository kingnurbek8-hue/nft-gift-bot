<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #32CD32; --blue: #00d1ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .balance { background: var(--card); padding: 8px 15px; border-radius: 20px; border: 1px solid #333; font-weight: bold; }
        .balance span { color: var(--blue); }

        /* Views */
        .view { display: none; }
        .view.active { display: block; }

        /* Case Card */
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .case-card { background: var(--card); border-radius: 25px; padding: 20px; text-align: center; border: 1px solid #222; }
        .case-card img { width: 100%; max-width: 100px; margin-bottom: 10px; transition: 0.3s; }
        .case-card:active img { transform: scale(0.9); }
        .btn-open { background: var(--accent); color: black; border: none; width: 100%; padding: 12px; border-radius: 15px; font-weight: bold; margin-top: 10px; }

        /* Backpack Item */
        .item-card { background: #1a1a1a; border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--accent); }

        /* Nav */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance">💎 <span id="user-balance">0.00</span></div>
        <button onclick="alert('Tez kunda...')" style="background:var(--blue); border:none; padding:8px 15px; border-radius:12px; font-weight:bold;">DEPOSIT</button>
    </div>

    <div id="home" class="view active">
        <h3 style="color: #888;">EXCLUSIVE CASES</h3>
        <div class="case-grid">
            <div class="case-card" style="border-color: var(--accent);">
                <img src="https://i.ibb.co/vYm6v6K/pepe-gift.png">
                <div>Free24 Case</div>
                <button class="btn-open" onclick="openCase('Pepe Ring', 0.05)">OPEN FREE</button>
            </div>
            <div class="case-card">
                <img src="https://cdn-icons-png.flaticon.com/512/2850/2850366.png">
                <div>Farm Case</div>
                <button class="btn-open" style="background:#444; color:white;">0.1 TON</button>
            </div>
        </div>
    </div>

    <div id="backpack" class="view">
        <h3>MY ITEMS</h3>
        <div id="items-list">
            <p style="color: #555; text-align: center;">Sumkangiz hozircha bo'sh...</p>
        </div>
    </div>

    <div id="invite" class="view" style="text-align: center; padding-top: 40px;">
        <i class="fa-solid fa-user-plus" style="font-size: 60px; color: var(--accent);"></i>
        <h2>Invite Friends</h2>
        <p>Har bir taklif uchun 0.01 TON oling!</p>
        <button class="btn-open" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/share/url?url=t.me/SizningBotiz')">INVITE</button>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="showView('backpack', this)"><i class="fa-solid fa-briefcase"></i>Backpack</div>
        <div class="nav-item" onclick="showView('invite', this)"><i class="fa-solid fa-users"></i>Invite</div>
        <div class="nav-item active" onclick="showView('home', this)"><i class="fa-solid fa-house"></i>Home</div>
        <div class="nav-item"><i class="fa-solid fa-chart-line"></i>Leader</div>
        <div class="nav-item"><i class="fa-solid fa-wallet"></i>Earn</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 0.00;
        let items = [];

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function openCase(itemName, price) {
            tg.HapticFeedback.notificationOccurred('success');
            balance += price;
            document.getElementById('user-balance').innerText = balance.toFixed(2);
            
            items.push(itemName);
            updateBackpack();
            
            tg.showPopup({
                title: 'Tabriklaymiz!',
                message: 'Sizga ' + itemName + ' tushdi va balansingizga $' + price + ' qo\'shildi!',
                buttons: [{type: 'ok'}]
            });
        }

        function updateBackpack() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map(item => `
                <div class="item-card">
                    <i class="fa-solid fa-gem" style="color:var(--blue)"></i>
                    <span>${item}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
